# CI monorepo — sostituisce scraper/.github/workflows/ci.yml (posizione dove GitHub non la eseguiva).
# GitHub Actions legge i workflow SOLO da .github/workflows/ alla RADICE del repository.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scraper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check scraper/ tests/

      # Format check disattivato finché non si fa il pass di `ruff format` su tutto lo scraper
      # (21 file da riformattare al 2026-07-07 — rimandato a dopo l'esposizione del 14/07).
      # - name: Format check (ruff)
      #   run: ruff format --check scraper/ tests/

      - name: Test with coverage
        run: pytest tests/ --cov --cov-report=term-missing --cov-fail-under=60

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Test
        run: pytest tests/ -q
