# Config ruff backend — stesse regole dello scraper (vedi scraper/pyproject.toml [tool.ruff])
line-length = 120
target-version = "py312"

[lint]
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
    "B904",  # raise-without-from-inside-except — stile intenzionale
    "B008",  # function-call-in-default-argument — Depends()/Query() nei default è l'idioma FastAPI
    "E501",  # line-too-long — gestito da line-length sopra
]

[lint.isort]
known-first-party = ["app"]
force-sort-within-sections = true
